<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afinador Sax Alto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tuner-container">
        <header class="tuner-header">
            <h1>AFINADOR SAX ALTO</h1>
        </header>

        <!-- Display principal de Frequência e Nota -->
        <div class="frequency">440.0 Hz</div>
<div class="note-label">NOTA: <span class="note">--</span></div>
<div class="status-message">--</div>

<div class="meter-container">
    <div class="meter-bar flat"></div>
    <div class="meter-bar flat-mild"></div>
    <div class="meter-bar perfect"></div>
    <div class="meter-bar sharp-mild"></div>
    <div class="meter-bar sharp"></div>
</div>

<div class="deviation">CENT DEVIATION: 0</div>

<div class="tuner-controls">
    <button class="btn btn-start" onclick="iniciar()">▶ INICIAR AFINAÇÃO</button>
    <button class="btn btn-stop" onclick="parar()">■ PARAR AFINAÇÃO</button>
</div>

<script src="javascript/script.js"></script>

</body>
</html>
